trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  python_version: "3.13"

stages:
  - stage: Validate
    jobs:
      - job: Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: "Use Python $(python_version)"
            inputs:
              versionSpec: "$(python_version)"
              addToPath: true

          - script: |
              set -euo pipefail
              pip install uv
              uv --version
            displayName: "Install uv"

          - script: uv sync --all-packages
            displayName: "Install dependencies"

          - script: uv run ruff check .
            displayName: "Lint (ruff)"

          - script: uv run ty check
            displayName: "Type check (ty)"

      - job: Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: "Use Python $(python_version)"
            inputs:
              versionSpec: "$(python_version)"
              addToPath: true

          - script: |
              set -euo pipefail
              pip install uv
              uv --version
            displayName: "Install uv"

          - script: uv sync --all-packages
            displayName: "Install dependencies"

          - script: uv run pytest
            displayName: "Run tests (pytest)"

  - stage: Build
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildDist
        displayName: Build (sdist + wheel)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: "Use Python $(python_version)"
            inputs:
              versionSpec: "$(python_version)"
              addToPath: true

          - script: |
              set -euo pipefail
              pip install uv
              uv --version
            displayName: "Install uv"

          - script: uv build --package mcp-shared
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Build mcp-shared"

          - script: uv build --package mcp-server
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Build mcp-template-server"

          - publish: $(Build.SourcesDirectory)/dist
            artifact: pypkg-dist
            displayName: "Publish build artifacts"
