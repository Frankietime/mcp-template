[project]
name = "beetle"
version = "0.1.0"
description = "Beetle (=){) — logs interpreter agent for pydantic-ai TUIs"
requires-python = ">=3.13"

dependencies = [
    "pydantic-ai>=0.2.0",
]

[project.scripts]
beetle = "beetle.__main__:main"

[tool.uv]
package = true

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"
