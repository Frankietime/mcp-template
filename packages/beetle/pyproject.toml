[project]
name = "beetle"
version = "0.1.0"
description = "Beetle (=){) — logs interpreter agent for pydantic-ai TUIs"
requires-python = ">=3.13"

dependencies = [
    "pydantic-ai>=0.2.0",
    "prompt-toolkit>=3.0.51",
    "python-dotenv>=1.0.0",
    "equator",
]

[project.scripts]
beetle = "beetle.__main__:main"

[tool.uv]
package = true

[tool.uv.sources]
equator = { workspace = true }

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"
